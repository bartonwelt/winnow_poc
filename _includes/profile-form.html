<form>
    <div class="border rounded p-4 mb-3">
        <div class="d-flex align-items-center justify-content-between">
            <div>
                <h2 class="h5">
                    <a href="" data-bs-toggle="collapse" href="#collapseDetails" role="button" aria-expanded="true" aria-controls="collapseDetails">
                        My Details
                    </a>
                </h2>
                <small class="text-muted">
                    Personal info related to your account.
                </small>
            </div>
            <button class="btn btn-outline-secondary" type="button" data-bs-toggle="collapse" href="#collapseDetails" aria-expanded="false" aria-controls="collapseDetails" onclick="toggleBtnClass(detailsToggle, 'bi-chevron-left', 'bi-chevron-down')">
                <i class="bi bi-chevron-down" id="detailsToggle"></i>
            </button>
        </div>
        <div class="row collapse show" id="collapseDetails">
            <div class="col-12 pt-4">
                <div class="col-xxl-6 mb-4">
                    <label for="fullName" class="form-label" required>Email Address</label>
                    <input type="text" class="form-control" id="fullName" value="hello@winnow.law">
                    <div class="form-text">
                        The email address you use to log into Winnow.
                    </div>
                </div>
                <hr>
                <div class="col-xxl-6 mb-4">
                    <label for="email" class="form-label" required>Full Name</label>
                    <input type="text" class="form-control" id="email" value="{{ site.data.settings.users.rows[0]name.first_name}} {{ site.data.settings.users.rows[0]name.last_name}}">
                </div>
                <div class="col-xxl-6 mb-4">
                    <label for="jobTitle" class="form-label" required>Job Title</label>
                    <input type="text" class="form-control" id="jobTitle" value="{{ site.data.settings.users.rows[0]job_title}}">
                </div>
                <a href="" role="button" class="btn btn-primary">Save Changes</a>
            </div>
        </div>
    </div>
    <div class="border rounded p-4 mb-3">
        <div class="d-flex align-items-center justify-content-between">
            <div>
                <h2 class="h5">
                    <a href="" data-bs-toggle="collapse" href="#collapsePassword" role="button" aria-expanded="true" aria-controls="collapsePassword">
                        Password
                    </a>
                </h2>
                <small class="text-muted">
                    Change the password you use to log into Winnow.
                </small>
            </div>
            <button class="btn btn-outline-secondary" type="button" data-bs-toggle="collapse" href="#collapsePassword" aria-expanded="false" aria-controls="collapsePassword" onclick="toggleBtnClass(passwordToggle, 'bi-chevron-down', 'bi-chevron-left')">
                <i class="bi bi-chevron-left" id="passwordToggle"></i>
            </button>
        </div>
        <div class="row collapse" id="collapsePassword">
            <div class="col-12 col-xxl-6 pt-4">
                <div class="mb-4">
                    <label for="password" class="form-label" required>Password</label>
                    <input type="password" class="form-control" id="password">
                </div>
                <div class="mb-4">
                    <label for="confirmPassword" class="form-label" required>Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword">
                </div>
                <a href="" role="button" class="btn btn-primary">Change Password</a>
            </div>
        </div>
    </div>
</form>
