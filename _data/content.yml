requirement:
  details:
    - title: Jurisdiction
      value: Alabama
    - title: Citation
      value: Ala. Code § 24-8-6
    - title: Trigger
      value: When a person or other entity's business includes engaging in residential real estate related transactions. Ala. Code § 24-8-6(a).
    - title: Requirement Text
      value: A person or entity must not discriminate against any person in making available a residential real estate related transaction, or in the terms or conditions of the transaction, because of race, color, religion, sex, handicap, familial status, or national origin. Ala. Code § 24-8-6(a).
    - title: Timing
      value: N/A
    - title: Beginning Effective Date
      value: Mar 20, 2021
    - title: Ending Effective Date
      value: N/A
      